# ============================================================
# docker-compose.yml — GLMS Full Stack (Part 3)
# Student: Tayler Usmar | ST10445063 | PROG7311 POE Part 3
#
# WHAT THIS FILE DOES:
# Defines and orchestrates 3 Docker containers that together
# make up the full GLMS system:
#
#   Container 1: sql-server-db    — Microsoft SQL Server 2022
#   Container 2: glms-backend-api — GLMS.Api Web API
#   Container 3: glms-frontend-web — GLMS.Web MVC App
#
# HOW TO RUN:
#   docker compose up --build
#
# HOW TO STOP:
#   docker compose down
#
# AFTER STARTING:
#   - Swagger UI (API):  http://localhost:5001/swagger
#   - MVC Frontend:      http://localhost:5000
#   - Login: admin / Admin@123
#
# NETWORKING:
#   All containers are on the 'glms-network' bridge network.
#   They communicate using their SERVICE NAMES as hostnames:
#     glms-backend-api → calls → sql-server-db:1433
#     glms-frontend-web → calls → glms-backend-api:8080
#   These names resolve automatically within Docker — no IP addresses needed.
# ============================================================

services:

  # ============================================================
  # CONTAINER 1: SQL Server Database
  # Image: Official Microsoft SQL Server 2022 on Linux
  # Port: 1433 (SQL Server default, exposed to host for debugging)
  # ============================================================
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: glms-sql-db
    environment:
      # Required by the SQL Server image
      SA_PASSWORD: "GLMS_Password_2026!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"   # Free developer edition
    ports:
      - "1433:1433"            # Expose to host (useful for SQL Server Management Studio)
    volumes:
      - sqldata:/var/opt/mssql # Persist data between restarts
    networks:
      - glms-network
    healthcheck:
      # Wait until SQL Server is ready to accept connections before starting the API
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'GLMS_Password_2026!' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # CONTAINER 2: GLMS.Api — the Web API (Business Logic + DB access)
  # Built from: Dockerfile.api
  # Port: 5001 (mapped from internal 8080)
  # Depends on: sql-server-db (waits for DB health check)
  # ============================================================
  glms-backend-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: glms-api
    environment:
      # Override the connection string to point to the SQL Server container.
      # 'sql-server-db' resolves to Container 1's IP via Docker DNS.
      ConnectionStrings__DefaultConnection: >
        Server=sql-server-db,1433;
        Database=GLMS;
        User Id=sa;
        Password=GLMS_Password_2026!;
        TrustServerCertificate=True;
        MultipleActiveResultSets=true
      # JWT configuration (must match what the MVC app uses to verify tokens)
      Jwt__Key: "GLMS_Super_Secret_JWT_Key_For_Tayler_Usmar_ST10445063_PROG7311_2026"
      Jwt__Issuer: "GLMS.Api"
      Jwt__Audience: "GLMS.Web"
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5001:8080"            # Host 5001 → Container 8080 (Swagger: http://localhost:5001/swagger)
    depends_on:
      sql-server-db:
        condition: service_healthy  # Only start API after DB is ready
    networks:
      - glms-network
    restart: on-failure

  # ============================================================
  # CONTAINER 3: GLMS.Web — the MVC Frontend (Presentation Layer)
  # Built from: Dockerfile.web
  # Port: 5000 (mapped from internal 8080)
  # Depends on: glms-backend-api
  # ============================================================
  glms-frontend-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: glms-web
    environment:
      # Point the MVC app to the API container.
      # 'glms-backend-api' resolves to Container 2's IP via Docker DNS.
      ApiBaseUrl: "http://glms-backend-api:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5000:8080"            # Host 5000 → Container 8080 (App: http://localhost:5000)
    depends_on:
      - glms-backend-api       # MVC needs the API to be running
    networks:
      - glms-network
    restart: on-failure

# ============================================================
# NAMED VOLUME — persists SQL Server data between docker compose up/down
# Without this, all data is lost when containers are removed.
# ============================================================
volumes:
  sqldata:

# ============================================================
# BRIDGE NETWORK — isolates GLMS containers from other Docker networks.
# Containers on the same network can reach each other by service name.
# ============================================================
networks:
  glms-network:
    driver: bridge
